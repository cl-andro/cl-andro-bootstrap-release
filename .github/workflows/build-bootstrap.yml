name: Build & Release CL-Andro Bootstrap

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release Notes (optional)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clone Packages Repository
        run: |
          git clone --depth 1 https://github.com/cl-andro/cl-andro-packages.git cl-andro-packages-repo

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg zip

      - name: Make forge script executable
        run: chmod +x forge-developer.sh

      - name: Build Bootstrap Payload
        run: ./forge-developer.sh

      - name: Calculate Next Version Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the latest release tag using GitHub CLI
          LATEST_TAG=$(gh release view --json tagName --template '{{.tagName}}' 2>/dev/null || echo "v1.0")
          echo "Latest tag found: $LATEST_TAG"
          
          # Strip the leading 'v'
          VERSION=${LATEST_TAG#v}
          
          # Parse Major and Minor numbers
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          
          if [ -z "$MINOR" ]; then MINOR=0; fi
          
          # Increment minor version
          MINOR=$((MINOR + 1))
          
          # Rollover logic (e.g., v1.9 -> v2.0)
          if [ "$MINOR" -ge 10 ]; then
            MINOR=0
            MAJOR=$((MAJOR + 1))
          fi
          
          NEXT_TAG="v$MAJOR.$MINOR"
          echo "Calculated next tag: $NEXT_TAG"
          
          # Save variables to environment
          echo "NEXT_TAG=$NEXT_TAG" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEXT_TAG }}
          name: "Release ${{ env.NEXT_TAG }}"
          body: ${{ inputs.release_notes }}
          files: bootstrap-aarch64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
